# bridge_rover.yaml — podul ros_gz pentru rover (Gazebo Harmonic <-> ROS2 Jazzy)
#
# Rulare:
#   ros2 run ros_gz_bridge parameter_bridge --ros-args \
#       -p config_file:=$(pwd)/bridge_rover.yaml
#
# Nota: topicurile gz pentru senzorii din link au forma scurta data in
# <topic> (ex. "scan"); daca in lumea ta apar cu prefix
# /world/<lume>/model/rover/... verifica numele real cu `gz topic -l`
# si ajusteaza gz_topic_name aici — restul ramane identic.

# lidar -> garda de obstacole (obstacle_guard_node)
- ros_topic_name: "/scan"
  gz_topic_name: "scan"
  ros_type_name: "sensor_msgs/msg/LaserScan"
  gz_type_name: "gz.msgs.LaserScan"
  direction: GZ_TO_ROS

# imu (optional — fuziune/diagnoza)
- ros_topic_name: "/imu"
  gz_topic_name: "imu"
  ros_type_name: "sensor_msgs/msg/Imu"
  gz_type_name: "gz.msgs.IMU"
  direction: GZ_TO_ROS

# navsat (optional — pozitie GPS simulata)
- ros_topic_name: "/navsat"
  gz_topic_name: "navsat"
  ros_type_name: "sensor_msgs/msg/NavSatFix"
  gz_type_name: "gz.msgs.NavSat"
  direction: GZ_TO_ROS

# bateria liniara simulata de Gazebo (vezi battery_plugin.sdf.xml)
- ros_topic_name: "/rover/battery"
  gz_topic_name: "/model/rover/battery/linear_battery/state"
  ros_type_name: "sensor_msgs/msg/BatteryState"
  gz_type_name: "gz.msgs.BatteryState"
  direction: GZ_TO_ROS

# camera comprimata -> video_link_node (necesita senzor camera in SDF)
- ros_topic_name: "/camera/image/compressed"
  gz_topic_name: "camera/compressed"
  ros_type_name: "sensor_msgs/msg/CompressedImage"
  gz_type_name: "gz.msgs.CompressedImage"
  direction: GZ_TO_ROS

# comanda si odometria DiffDrive (deja folosite de robot_node)
- ros_topic_name: "/model/rover/cmd_vel"
  gz_topic_name: "/model/rover/cmd_vel"
  ros_type_name: "geometry_msgs/msg/Twist"
  gz_type_name: "gz.msgs.Twist"
  direction: ROS_TO_GZ

- ros_topic_name: "/model/rover/odometry"
  gz_topic_name: "/model/rover/odometry"
  ros_type_name: "nav_msgs/msg/Odometry"
  gz_type_name: "gz.msgs.Odometry"
  direction: GZ_TO_ROS
