# IMU-urile inserate de patch (necesita lumea rehab_world.sdf):
- ros_topic_name: "/rehab/imu/base_link"
  gz_topic_name: "/rehab/imu/base_link"
  ros_type_name: "sensor_msgs/msg/Imu"
  gz_type_name: "gz.msgs.IMU"
  direction: GZ_TO_ROS

- ros_topic_name: "/rehab/imu/left_foot"
