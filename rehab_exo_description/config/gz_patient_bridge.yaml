  gz_type_name: "gz.msgs.Double"
  direction: ROS_TO_GZ

- ros_topic_name: "/rehab/patient_force/right_knee_joint"
  gz_topic_name: "/model/rehab_exo/joint/right_knee_joint/cmd_force"
  ros_type_name: "std_msgs/msg/Float64"
