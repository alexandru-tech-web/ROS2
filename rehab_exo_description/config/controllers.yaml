# controllers.yaml — Configurare ros2_control pentru robotul de recuperare (6 GDL).
# Plasati in:  rehab_exo_description/config/controllers.yaml
# Referit din plugin-ul gz_ros2_control din URDF.

controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    # Controller de pozitie pe traiectorie pentru toate cele 6 articulatii.
    leg_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController

joint_state_broadcaster:
  ros__parameters:
    use_local_topics: false

leg_trajectory_controller:
  ros__parameters:
    joints:
      - left_hip_joint
      - left_knee_joint
      - left_ankle_joint
      - right_hip_joint
      - right_knee_joint
      - right_ankle_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    # Constrangeri de siguranta — esential pentru un dispozitiv medical.
    # Vitezele lente protejeaza pacientul; ajustati impreuna cu personalul clinic.
    constraints:
      stopped_velocity_tolerance: 0.01
      goal_time: 0.5
      left_hip_joint:    { trajectory: 0.05, goal: 0.02 }
      left_knee_joint:   { trajectory: 0.05, goal: 0.02 }
      left_ankle_joint:  { trajectory: 0.05, goal: 0.02 }
      right_hip_joint:   { trajectory: 0.05, goal: 0.02 }
      right_knee_joint:  { trajectory: 0.05, goal: 0.02 }
      right_ankle_joint: { trajectory: 0.05, goal: 0.02 }
