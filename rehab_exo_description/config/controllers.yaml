# controllers.yaml — Configurare ros2_control pentru robotul de recuperare (6 GDL).
# Plasati in:  rehab_exo_description/config/controllers.yaml
# Referit din plugin-ul gz_ros2_control din URDF.

controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    # Controller de pozitie pe traiectorie pentru toate cele 6 articulatii.
    leg_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    # v3: controller de pozitie pentru axele de ajustare (prismatice).
    adjust_position_controller:
      type: position_controllers/JointGroupPositionController

joint_state_broadcaster:
  ros__parameters:
    use_local_topics: false

leg_trajectory_controller:
  ros__parameters:
    joints:
      - left_hip_joint
      - left_knee_joint
      - left_ankle_joint
      - right_hip_joint
      - right_knee_joint
      - right_ankle_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    # Toleranta de urmarire DEZACTIVATA (0.0): in fizica reala, eroarea
    # tranzitorie depaseste usor cativa sutimi de radian, iar o toleranta
    # stransa face JTC sa ABORTEZE traiectoria imediat (simptom: robotul
    # "misca putin apoi se opreste"). Pe hardware real, siguranta vine din
    # limitarea de cuplu + oprirea de urgenta, nu din abort de traiectorie.
    constraints:
      stopped_velocity_tolerance: 0.0
      goal_time: 0.0

adjust_position_controller:
  ros__parameters:
    joints:
      - seat_lift_joint
      - left_thigh_ext_joint
      - right_thigh_ext_joint
      - left_shank_ext_joint
      - right_shank_ext_joint
